<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mio</h1>
    <h4>Make It Out (of the GC)</h4>

    <div id="monthBar">
        <div id="leftControls">
            <div id="previousMonth">❮</div>
        </div>

        <div id="monthTitle"></div>

        <div id="rightControls">
            <div id="shareButton">Share</div>
            <div id="currMonth">Today</div>
            <div id="nextMonth">❯</div>
        </div>
        </div>
    </div>

    <div id="sharePlacePopup">
        <div id="shareBox">
            <h3>Share Calendar</h3>
            <p>Copy this link and send it to others:</p>
            <div id="shareLinkBox">
                <input type="text" id="shareLinkInput" readonly>
                <div id="copyButton">Copy</div>
            </div>
            <div id="shareCloseButton">Close</div>
        </div>
    </div>

    <div id="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div id="calendar"></div>

    <div id="eventPlace">
        <div id="eventBox">
            <h3>Add Event</h3>

            <input type="text" id="eventInput" placeholder="Enter event">

            <div id="saveButton">Save Event</div>
            <div id="deleteButton">Delete Event</div>
            <div id="cancelButton">Cancel</div>
        </div>
    </div>

<script src="main.js"></script>
</body>
</html>
